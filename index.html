<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Outfit', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'dark': {
                            bg: '#0a0a0f',
                            card: '#13131a',
                            border: '#1f1f2e',
                            hover: '#1a1a25',

                            emerald: '#10b981',
                            amber: '#f59e0b',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>
    <style>
        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #2d2d3f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3d3d52; }
        
        /* 选中文本 */
        ::selection { background: rgba(59, 130, 246, 0.3); color: #fff; }
        
        /* 焦点环 */
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
        
        /* 平滑滚动 */
        html { scroll-behavior: smooth; }
        
        /* 卡片悬停 */
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            border-color: #2d2d3f;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        
        /* 延迟动画 */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        
        /* 表格行悬停 */
        .table-row-hover:hover {
            background: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>

    <script src="data.js"></script>
    <script>
        // 渲染提供商卡片
        function renderProviderCard(provider, type, index) {
            const card = document.createElement('article');
            card.className = 'provider-card bg-dark-card rounded-xl border border-dark-border p-5 card-hover opacity-0';
            card.style.animationDelay = `${index * 0.05}s`;
            card.style.animation = 'slideUp 0.5s ease-out forwards';
            card.dataset.type = type;
            card.dataset.name = provider.name.toLowerCase();

            // 头部
            const header = document.createElement('div');
            header.className = 'flex items-start justify-between gap-3 mb-4';
            
            const nameLink = document.createElement('a');
            nameLink.className = 'font-display text-lg font-600 text-white hover:text-accent-blue transition-colors';
            nameLink.href = provider.url;
            nameLink.target = '_blank';
            nameLink.rel = 'noopener noreferrer';
            nameLink.textContent = provider.name;
            
            const badge = document.createElement('span');
            badge.className = `flex-shrink-0 px-3 py-1 rounded-md text-sm font-600 ${
                provider.badge === 'free' 
                    ? 'bg-accent-emerald/15 text-accent-emerald' 
                    : 'bg-accent-amber/15 text-accent-amber'
            }`;
            badge.textContent = provider.badge === 'free' ? '免费' : '试用';
            
            header.appendChild(nameLink);
            header.appendChild(badge);
            card.appendChild(header);

            // 额度/限制信息
            if (provider.credits) {
                const div = document.createElement('div');
                div.className = 'mb-4 p-3 bg-dark-bg rounded-lg border-l-2 border-accent-amber';
                div.innerHTML = `
                    <div class="text-xs font-500 text-gray-500 uppercase tracking-wider mb-1">试用额度</div>
                    <div class="text-sm text-gray-300">${provider.credits}</div>
                `;
                card.appendChild(div);
            }

            if (provider.limits) {
                const div = document.createElement('div');
                div.className = 'mb-4 p-3 bg-dark-bg rounded-lg border-l-2 border-accent-emerald';
                const content = provider.limitsUrl 
                    ? `<a href="${provider.limitsUrl}" target="_blank" rel="noopener noreferrer" class="text-accent-blue hover:text-accent-cyan transition-colors">${provider.limits}</a>`
                    : provider.limits;
                div.innerHTML = `
                    <div class="text-xs font-500 text-gray-500 uppercase tracking-wider mb-1">使用限制</div>
                    <div class="text-sm text-gray-300 leading-relaxed">${content}</div>
                `;
                card.appendChild(div);
            }

            // 限制表格 - 折叠展示
            if (provider.limitsTable) {
                const div = document.createElement('div');
                div.className = 'mb-4 overflow-hidden rounded-lg border border-dark-border';
                
                const maxRows = 3;
                const displayRows = provider.limitsTable.slice(0, maxRows);
                const hiddenRows = provider.limitsTable.slice(maxRows);
                const hasMore = hiddenRows.length > 0;
                
                let tableHTML = `
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-dark-bg">
                                    <th class="text-left py-2.5 px-3 font-600 text-gray-400">模型</th>
                                    <th class="text-left py-2.5 px-3 font-600 text-gray-400">限制</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-dark-border">
                `;
                
                displayRows.forEach((row) => {
                    const modelName = row.url 
                        ? `<a href="${row.url}" target="_blank" rel="noopener noreferrer" class="text-accent-blue hover:text-accent-cyan transition-colors">${row.model}</a>`
                        : row.model;
                    tableHTML += `
                        <tr class="table-row-hover transition-colors">
                            <td class="py-2.5 px-3 text-gray-300">${modelName}</td>
                            <td class="py-2.5 px-3 text-gray-400">${row.limits}</td>
                        </tr>
                    `;
                });
                
                tableHTML += '</tbody></table></div>';
                div.innerHTML = tableHTML;
                
                if (hasMore) {
                    const tbody = div.querySelector('tbody');
                    
                    const expandBtn = document.createElement('tr');
                    expandBtn.className = 'cursor-pointer hover:bg-dark-hover transition-colors';
                    expandBtn.innerHTML = `
                        <td colspan="2" class="py-2.5 px-3 text-center">
                            <button class="text-accent-blue text-sm font-500 hover:text-accent-cyan transition-colors inline-flex items-center gap-1">
                                <span class="expand-text">查看全部 ${provider.limitsTable.length} 个模型</span>
                                <svg class="expand-icon w-3.5 h-3.5 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>
                        </td>
                    `;
                    
                    let isExpanded = false;
                    const hiddenRowsElements = [];
                    
                    expandBtn.onclick = function() {
                        isExpanded = !isExpanded;
                        
                        if (isExpanded) {
                            hiddenRows.forEach((row, index) => {
                                const modelName = row.url 
                                    ? `<a href="${row.url}" target="_blank" rel="noopener noreferrer" class="text-accent-blue hover:text-accent-cyan transition-colors">${row.model}</a>`
                                    : row.model;
                                
                                const tr = document.createElement('tr');
                                tr.className = 'table-row-hover transition-colors hidden-row';
                                tr.style.opacity = '0';
                                tr.innerHTML = `
                                    <td class="py-2.5 px-3 text-gray-300">${modelName}</td>
                                    <td class="py-2.5 px-3 text-gray-400">${row.limits}</td>
                                `;
                                
                                tbody.insertBefore(tr, expandBtn);
                                hiddenRowsElements.push(tr);
                                
                                setTimeout(() => {
                                    tr.style.transition = 'opacity 0.2s ease';
                                    tr.style.opacity = '1';
                                }, index * 30);
                            });
                            
                            this.querySelector('.expand-text').textContent = '收起';
                            this.querySelector('.expand-icon').style.transform = 'rotate(180deg)';
                        } else {
                            hiddenRowsElements.forEach(tr => {
                                tr.style.opacity = '0';
                                setTimeout(() => tr.remove(), 200);
                            });
                            hiddenRowsElements.length = 0;
                            
                            this.querySelector('.expand-text').textContent = `查看全部 ${provider.limitsTable.length} 个模型`;
                            this.querySelector('.expand-icon').style.transform = 'rotate(0deg)';
                        }
                    };
                    
                    tbody.appendChild(expandBtn);
                }
                
                card.appendChild(div);
            }

            // 备注 - 支持折叠
            if (provider.notes) {
                const div = document.createElement('div');
                div.className = 'mb-4 p-3 bg-accent-cyan/5 border border-accent-cyan/15 rounded-lg text-sm text-gray-400 flex items-start gap-2';
                
                const notesContent = provider.notes;
                const maxChars = 100;
                const needsCollapse = notesContent.length > maxChars;
                
                if (needsCollapse) {
                    const shortNotes = notesContent.substring(0, maxChars) + '...';
                    
                    div.innerHTML = `
                        <svg class="w-4 h-4 text-accent-cyan flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <div class="flex-1">
                            <span class="notes-text">${shortNotes}</span>
                            <button class="notes-toggle text-accent-cyan hover:text-accent-blue font-500 ml-1 transition-colors">
                                展开
                            </button>
                        </div>
                    `;
                    
                    let isExpanded = false;
                    const notesText = div.querySelector('.notes-text');
                    const toggleBtn = div.querySelector('.notes-toggle');
                    
                    toggleBtn.onclick = function() {
                        isExpanded = !isExpanded;
                        if (isExpanded) {
                            notesText.textContent = notesContent;
                            this.textContent = '收起';
                        } else {
                            notesText.textContent = shortNotes;
                            this.textContent = '展开';
                        }
                    };
                } else {
                    div.innerHTML = `
                        <svg class="w-4 h-4 text-accent-cyan flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span>${notesContent}</span>
                    `;
                }
                
                card.appendChild(div);
            }

            // 模型列表 - 折叠展示
            if (provider.models && provider.models.length > 0) {
                const div = document.createElement('div');
                div.className = 'models-section';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'flex items-center justify-between mb-3';
                titleDiv.innerHTML = `
                    <div class="text-xs font-500 text-gray-500 uppercase tracking-wider">
                        支持模型 <span class="text-accent-blue">(${provider.models.length})</span>
                    </div>
                `;
                
                const list = document.createElement('div');
                list.className = 'models-list flex flex-wrap gap-2';
                
                const maxVisible = 3;
                const displayModels = provider.models.slice(0, maxVisible);
                const hiddenModels = provider.models.slice(maxVisible);
                const hasMore = hiddenModels.length > 0;
                
                displayModels.forEach(model => {
                    const tag = document.createElement('span');
                    tag.className = 'px-3 py-1.5 bg-dark-bg rounded-md text-sm text-gray-400 cursor-default transition-colors hover:text-gray-300';
                    if (model.url) {
                        tag.innerHTML = `<a href="${model.url}" target="_blank" rel="noopener noreferrer" class="hover:text-accent-blue transition-colors">${model.name}</a>`;
                    } else {
                        tag.textContent = model.name;
                    }
                    list.appendChild(tag);
                });
                
                if (hasMore) {
                    const btn = document.createElement('button');
                    btn.className = 'px-3 py-1.5 bg-accent-blue/10 rounded-md text-sm text-accent-blue font-500 hover:bg-accent-blue/20 transition-colors';
                    btn.innerHTML = `
                        <span class="expand-text">+${hiddenModels.length} 更多</span>
                    `;
                    
                    let isExpanded = false;
                    const hiddenTags = [];
                    
                    btn.onclick = function() {
                        isExpanded = !isExpanded;
                        
                        if (isExpanded) {
                            hiddenModels.forEach(model => {
                                const tag = document.createElement('span');
                                tag.className = 'px-3 py-1.5 bg-dark-bg rounded-md text-sm text-gray-400 cursor-default transition-colors hover:text-gray-300';
                                if (model.url) {
                                    tag.innerHTML = `<a href="${model.url}" target="_blank" rel="noopener noreferrer" class="hover:text-accent-blue transition-colors">${model.name}</a>`;
                                } else {
                                    tag.textContent = model.name;
                                }
                                tag.style.opacity = '0';
                                list.appendChild(tag);
                                hiddenTags.push(tag);
                                
                                setTimeout(() => {
                                    tag.style.transition = 'opacity 0.2s ease';
                                    tag.style.opacity = '1';
                                }, 10);
                            });
                            
                            this.querySelector('.expand-text').textContent = '收起';
                        } else {
                            hiddenTags.forEach(tag => {
                                tag.style.opacity = '0';
                                setTimeout(() => tag.remove(), 200);
                            });
                            hiddenTags.length = 0;
                            
                            this.querySelector('.expand-text').textContent = `+${hiddenModels.length} 更多`;
                        }
                    };
                    
                    list.appendChild(btn);
                }
                
                div.appendChild(titleDiv);
                div.appendChild(list);
                card.appendChild(div);
            }

            // 模型链接
            if (provider.modelsLink) {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="text-xs font-500 text-gray-500 uppercase tracking-wider mb-2">支持模型</div>
                    <a href="${provider.modelsLink.url || '#'}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-4 py-2 bg-dark-bg rounded-md text-sm text-accent-blue hover:text-accent-cyan transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                        </svg>
                        ${provider.modelsLink.text}
                    </a>
                `;
                card.appendChild(div);
            }

            return card;
        }

        // 渲染所有提供商
        function renderProviders() {
            const freeGrid = document.getElementById('freeProvidersGrid');
            const trialGrid = document.getElementById('trialProvidersGrid');
            
            freeGrid.innerHTML = '';
            trialGrid.innerHTML = '';
            
            providersData.free.forEach((provider, index) => {
                freeGrid.appendChild(renderProviderCard(provider, 'free', index));
            });
            
            providersData.trial.forEach((provider, index) => {
                trialGrid.appendChild(renderProviderCard(provider, 'trial', index));
            });
        }

        // 搜索功能
        function handleSearch(searchTerm) {
            const cards = document.querySelectorAll('.provider-card');
            const term = searchTerm.toLowerCase().trim();
            
            cards.forEach(card => {
                const name = card.dataset.name;
                const text = card.textContent.toLowerCase();
                
                card.style.display = (term === '' || name.includes(term) || text.includes(term)) ? '' : 'none';
            });
        }

        // 筛选功能
        function handleFilter(filterType) {
            const freeSection = document.getElementById('free-providers');
            const trialSection = document.getElementById('trial-providers');
            
            freeSection.style.display = filterType === 'trial' ? 'none' : '';
            trialSection.style.display = filterType === 'free' ? 'none' : '';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderProviders();
            
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;
            
            searchInput.addEventListener('input', function(e) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => handleSearch(e.target.value), 200);
            });
            
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterButtons.forEach(b => {
                        b.classList.remove('active', 'bg-accent-blue', 'text-white');
                        b.classList.add('bg-dark-bg', 'text-gray-400');
                    });
                    this.classList.add('active', 'bg-accent-blue', 'text-white');
                    this.classList.remove('bg-dark-bg', 'text-gray-400');
                    handleFilter(this.dataset.filter);
                });
            });
            
            // 设置初始状态
            filterButtons.forEach(btn => {
                if (btn.classList.contains('active')) {
                    btn.classList.add('bg-accent-blue', 'text-white');
                    btn.classList.remove('bg-dark-bg', 'text-gray-400');
                } else {
                    btn.classList.add('bg-dark-bg', 'text-gray-400');
                }
            });
        });
    </script>
</body>
</html>
